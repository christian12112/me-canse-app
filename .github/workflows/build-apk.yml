name: Build APK Fast and Blind

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Este comando le dice a Python y Cython que ignoren advertencias menores
  PYTHONWARNINGS: "ignore"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git zlib1g-dev \
          unzip automake autoconf libtool pkg-config libssl-dev texinfo libgmp-dev \
          libmpfr-dev libmpc-dev swig libffi-dev openjdk-17-jdk zip apktool \
          libsqlite3-dev

    - name: Set Java 17 as Default
      run: |
        sudo update-java-alternatives --set /usr/lib/jvm/java-1.17.0-openjdk-amd64 || true
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

    - name: Install Python Tools
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0"
        pip install buildozer kivy

    - name: Force Clean and Fix Configuration
      run: |
        # Elimina cualquier rastro corrupto previo
        rm -rf .buildozer/
        
        # Limpia a la fuerza cualquier línea problemática del micrófono en tu archivo spec
        if [ -f "buildozer.spec" ]; then
          sed -i '/microphone/d' buildozer.spec
          sed -i 's/--feature android.hardware.microphone//g' buildozer.spec
          sed -i 's/android.features = android.hardware.microphone//g' buildozer.spec
        fi
        
        # Acepta todas las licencias de Android en modo silencioso
        buildozer android status || true
        if [ -d "$HOME/.buildozer/android/platform/android-sdk" ]; then
          yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
        fi

    - name: Build with Buildozer (Ignore Warnings)
      run: |
        # Ejecuta buildozer pasándole "yes" automáticamente a cualquier pregunta interna
        yes | buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: christianx-apk-debug
        path: bin/*.apk
